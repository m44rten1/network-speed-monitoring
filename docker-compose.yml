services:
  influxdb:
    image: influxdb:2.7
    container_name: network-monitor-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=network-monitor
      - DOCKER_INFLUXDB_INIT_BUCKET=network_monitor
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=network-monitor-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
      - ./influxdb/setup.sh:/docker-entrypoint-initdb.d/setup.sh:ro
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pinger:
    build:
      context: ./pinger
      dockerfile: Dockerfile
    container_name: network-monitor-pinger
    restart: unless-stopped
    cap_add:
      - NET_RAW
    environment:
      - PING_TARGET=1.1.1.1
      - PING_INTERVAL_SECONDS=5
      - PING_TIMEOUT_SECONDS=4
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=network-monitor-token
      - INFLUXDB_ORG=network-monitor
      - INFLUXDB_BUCKET=network_monitor
    depends_on:
      influxdb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.0
    container_name: network-monitor-grafana
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
